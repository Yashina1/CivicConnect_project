<!DOCTYPE html>
<html>
<head>
<title>CivicConnect - Track Status</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

/* BACKGROUND */
body{
    background:#f4f6f9;
    min-height:100vh;
}

/* BACK BUTTON */
.back{
    position:absolute;
    top:20px;
    left:20px;
}

.back button{
    padding:10px 20px;
    background:#3498db;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.back button:hover{
    background:#2980b9;
}

/* MAIN CARD */
.container{
    width:600px;
    margin:80px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#0b3d91;
}

h3{
    text-align:center;
    color:#666;
    margin-bottom:20px;
}

/* DETAILS */
.details{
    line-height:2;
    font-size:15px;
    color:#333;
}

/* STATUS */
.status{
    display:inline-block;
    padding:6px 12px;
    border-radius:20px;
    background:#fff3cd;
    color:#856404;
    font-weight:bold;
}

/* IMAGE */
img{
    margin-top:10px;
    width:100%;
    border-radius:10px;
    border:1px solid #ddd;
}

/* PROGRESS BOX */
.progress{
    margin-top:20px;
    padding:15px;
    background:#f8f9fa;
    border-radius:10px;
}

.step{
    margin:8px 0;
}

.done{
    color:green;
}

.pending{
    color:#999;
}

</style>
</head>

<body>

<!-- BACK -->
<div class="back">
<a href="history.html">
<button>← Back</button>
</a>
</div>

<div class="container">

<h1>CivicConnect</h1>
<h3>Complaint Status Tracking</h3>

<div id="result"></div>

</div>

<script>

let complaint = JSON.parse(localStorage.getItem("complaint"));

let box = document.getElementById("result");

if(complaint){

    box.innerHTML = `
        <div class="details">

            <b>Complaint ID:</b> ${complaint.complaintId || complaint.id}<br>
            <b>Title:</b> ${complaint.title}<br>
            <b>Category:</b> ${complaint.category}<br>
            <b>Description:</b> ${complaint.description}<br>
            <b>Location:</b> ${complaint.location}<br>
            <b>Date:</b> ${complaint.date}<br>

            <br>

            <span class="status">
                ${complaint.status}
            </span>

            <br><br>

            <b>Uploaded Photo:</b><br>
            <img src="${complaint.image || ''}">

            <div class="progress">

                <h4>Progress Timeline</h4>

                <div class="step done">✔ Complaint Submitted</div>

                <div class="step ${complaint.status !== 'Submitted' ? 'done' : 'pending'}">
                    ✔ Under Review
                </div>

                <div class="step ${complaint.status === 'Resolved' ? 'done' : 'pending'}">
                    ✔ Resolved
                </div>

            </div>

        </div>
    `;

}
else{
    box.innerHTML = "<h3>No Complaint Found</h3>";
}

</script>

</body>
</html>
