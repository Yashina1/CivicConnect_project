
<!DOCTYPE html>
<html>
<head>
<title>CivicConnect - Citizen Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
}

.back-link{
    position:absolute;
    top:20px;
    left:20px;
    text-decoration:none;
}

.back-btn{
    width:auto;
    padding:10px 20px;
    background:#3498db;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.back-btn:hover{
    background:#2980b9;
}

.container{

    width:450px;

    background:white;

    padding:35px;

    border-radius:15px;

    box-shadow:0 4px 15px rgba(0,0,0,0.1);

    text-align:center;
}

.logo{
    font-size:45px;
}

h1{
    color:#0b3d91;
    margin-top:10px;
}

h3{
    color:#555;
    margin-bottom:25px;
}

input{

    width:100%;

    padding:12px;

    margin:10px 0;

    border:1px solid #ccc;

    border-radius:8px;

    outline:none;

    font-size:15px;
}

input:focus{
    border-color:#0b3d91;
}

button{

    width:100%;

    padding:12px;

    background:#0b3d91;

    color:white;

    border:none;

    border-radius:8px;

    font-size:16px;

    cursor:pointer;
}

button:hover{
    background:#072c68;
}

.forgot{

    display:block;

    margin-top:12px;

    color:#0b3d91;

    text-decoration:none;

    font-size:14px;
}

.forgot:hover{
    text-decoration:underline;
}

.info{

    margin-top:20px;

    color:#666;

    line-height:1.7;

    font-size:14px;
}

.footer{

    margin-top:20px;

    color:#888;

    font-size:13px;
}

</style>
</head>

<body>

<a href="dashboard.html" class="back-link">
<button type="button" class="back-btn">
← Back
</button>
</a>

<div class="container">

<div class="logo">🏛</div>

<h1>CivicConnect</h1>

<h3>Citizen Login Portal</h3>

<form onsubmit="loginCitizen(event)">

<input
type="text"
id="contact"
placeholder="Email or Mobile Number"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<button type="submit">
Login
</button>

</form>

<a href="#" class="forgot" onclick="forgotPassword()">
Forgot Password?
</a>

<div class="info">

Login to report civic issues, track complaint status,
and contribute to building a cleaner and smarter community.

</div>

<div class="footer">

Digital Governance for Smart Communities

</div>

</div>

<script>

function loginCitizen(e){

    e.preventDefault();

    let contact =
    document.getElementById("contact").value.trim();

    let password =
    document.getElementById("password").value.trim();

    let users =
    JSON.parse(localStorage.getItem("users")) || [];

    let registeredUser =
    users.find(u => u.contact === contact);

    if(!registeredUser){

        alert("You are not registered. Please register first.");

        return;
    }

    if(registeredUser.password !== password){

        alert("Invalid Password");

        return;
    }

    localStorage.setItem(
    "currentUser",
    contact
    );

    alert("Login Successful");

    window.location.href = "history.html";
}

function forgotPassword(){

    let contact = prompt("Enter your registered Email or Mobile Number");

    if(!contact) return;

    let users = JSON.parse(localStorage.getItem("users")) || [];

    let user = users.find(u => u.contact === contact);

    if(!user){
        alert("No registered user found.");
        return;
    }

    // check if input is email or mobile
    let isEmail = contact.includes("@");

    if(isEmail){
        alert(
            "📧 Password reset link has been sent to your EMAIL.\nPlease check your inbox to reset your password."
        );
    }
    else{
        alert(
            "📱 Password reset OTP has been sent to your MOBILE NUMBER.\nPlease check your messages to reset your password."
        );
    }
}
</script>

</body>
</html>
