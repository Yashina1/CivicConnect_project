<!DOCTYPE html>
<html>
<head>
<title>Complaint Summary - CivicConnect</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f7fb;
}

/* NAVBAR */
.navbar{
    background:#0f4c81;
    color:white;
    padding:15px;
    font-weight:600;
    text-align:center;
}

/* BACK BUTTON (below title) */
.back-container{
    background:#0f4c81;
    text-align:center;
    padding-bottom:12px;
}

.back-btn{
    display:inline-block;
    background:white;
    color:#0f4c81;
    padding:6px 14px;
    border-radius:6px;
    cursor:pointer;
    font-weight:600;
    margin-top:5px;
}

.back-btn:hover{
    background:#e6e6e6;
}

/* CONTAINER */
.container{
    max-width:800px;
    margin:40px auto;
    padding:20px;
}

/* CARD */
.card{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 2px 12px rgba(0,0,0,0.08);
}

/* TEXT */
h2{ color:#0f4c81; }

.label{
    font-size:12px;
    color:#777;
    margin-top:12px;
}

.value{
    font-size:14px;
    margin-top:3px;
}

/* IMAGE */
img{
    width:180px;
    height:180px;
    object-fit:cover;
    border-radius:10px;
    margin-top:10px;
}

/* BADGE */
.badge{
    display:inline-block;
    padding:6px 12px;
    border-radius:20px;
    font-size:12px;
}

.review{background:#fff3cd;color:#856404;}
.progress{background:#cce5ff;color:#004085;}
.resolved{background:#d4edda;color:#155724;}

/* BUTTON */
.btn{
    width:100%;
    padding:10px;
    margin-top:20px;
    border:none;
    border-radius:8px;
    background:#0f4c81;
    color:white;
    cursor:pointer;
}

.btn:hover{
    background:#08355c;
}

</style>
</head>

<body>

<!-- NAVBAR TITLE -->
<div class="navbar">🏛️ Complaint Summary</div>

<!-- BACK BUTTON BELOW TITLE -->
<div class="back-container">
    <div class="back-btn" onclick="goBack()">⬅ Back to Dashboard</div>
</div>

<!-- CONTENT -->
<div class="container">
    <div class="card" id="summary"></div>
</div>

<script>

let index = localStorage.getItem("selectedIndex");
let complaints = JSON.parse(localStorage.getItem("complaints")) || [];
let c = complaints[index];

function render(){

    if(!c){
        document.getElementById("summary").innerHTML = `
            <h2>No complaint found</h2>
            <button class="btn" onclick="goBack()">Back to Dashboard</button>
        `;
        return;
    }

    document.getElementById("summary").innerHTML = `

    <h2>${c.title || "No Title"}</h2>

    <div class="label">Category</div>
    <div class="value">${c.category || "N/A"}</div>

    <div class="label">Description</div>
    <div class="value">${c.description || "N/A"}</div>

    <div class="label">Location</div>
    <div class="value">${c.location || "N/A"}</div>

    <div class="label">Department</div>
    <div class="value">${c.department || "Not Assigned"}</div>

    <div class="label">Status</div>
    <div class="badge ${c.status==='Resolved'?'resolved':c.status==='In Progress'?'progress':'review'}">
        ${c.status || "Under Review"}
    </div>

    <div class="label">Remarks</div>
    <div class="value">${c.remarks || "No remarks"}</div>

    <div class="label">Citizen Image</div>
    ${c.image ? `<img src="${c.image}">` : "<div class='value'>No image uploaded</div>"}

    `;

}

function goBack(){
    window.location.href = "authority_dashboard.html";
}

render();

</script>

</body>
</html>
